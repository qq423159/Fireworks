<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>

html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial}
canvas{position:fixed;inset:0}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#main{color:#fff;text-align:center;text-shadow:0 0 15px #fff;position:relative}
#main h1{font-size:clamp(2rem,6vw,4rem)}#main p{font-size:clamp(1rem,3vw,1.3rem)}
.float{
    position:fixed;
    font-size:clamp(1.4rem,4vw,2.2rem);
    color:#ffb6d9;
    font-weight:bold;
    text-shadow:0 0 18px white;
    pointer-events:none;
    white-space:nowrap;
    animation:floatAround 4s ease-out forwards;
}

@keyframes floatAround{

    0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.7);
    }

    20%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translate(-50%,-120px) scale(1.2);
    }

}
.pet{position:fixed;font-size:38px;bottom:10px;animation:run 8s linear forwards}@keyframes run{from{transform:translateX(-60px)}to{transform:translateX(calc(100vw + 60px))}}
.heart{
    position:fixed;
    font-size:40px;
    pointer-events:none;
    z-index:99999;
    animation:heartPop 2s ease-out forwards;
}

@keyframes heartPop{

    0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.3);
    }

    20%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translate(-50%,-200%) scale(1.5);
    }

}  
</style></head><body><canvas id=c></canvas><div id=wrap><div id=main><h1>🎆 Happy 4th of July ❤️</h1><p>Even though we can't watch the fireworks together this year...</p><p>I wanted to bring a little fireworks show to you.</p><p>I love you more than words can say.</p><p><b>💛 B 💛</b></p></div></div>
<script>
const cv=c,ctx=cv.getContext('2d');function rs(){cv.width=innerWidth;cv.height=innerHeight}onresize=rs;rs();let ps=[];
function boom(x,y){

    const colors=[
        "#ff4d6d",
        "#ff66ff",
        "#00ffff",
        "#ffff00",
        "#ffffff",
        "#ff8800"
    ];
const rainbow = Math.random() < 0.4;
    const type=Math.floor(Math.random()*5);
const singleColor =
    colors[Math.floor(Math.random() * colors.length)];
    for(let i=0;i<220;i++){

        let angle=Math.random()*Math.PI*2;
        let speed=Math.random()*6+2;
        let vx,vy;

        switch(type){

            // Random burst
            case 0:
                vx=Math.cos(angle)*speed;
                vy=Math.sin(angle)*speed;
                break;

            // Perfect circle
            case 1:
                speed=6;
                vx=Math.cos(angle)*speed;
                vy=Math.sin(angle)*speed;
                break;

            // Heart shape ❤️
            case 2:
                let t=i/220*Math.PI*2;
                let hx=16*Math.pow(Math.sin(t),3);
                let hy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
                vx=hx*.5;
                vy=hy*.5;
                break;

            // Long streaks
            case 3:
                speed=Math.random()*10;
                vx=Math.cos(angle)*speed;
                vy=Math.sin(angle)*speed;
                break;

            // Chaos
            default:
                vx=(Math.random()-.5)*12;
                vy=(Math.random()-.5)*12;

        }

       ps.push({

    x,
    y,

    vx,
    vy,

    a:1,

c: rainbow
    ? `hsl(${i * 360 / 220},100%,60%)`
    : singleColor,

    s:Math.random()*3+2

});

    }

}
setInterval(()=>boom(Math.random()*cv.width,50+Math.random()*cv.height*.5),700);addEventListener('pointerdown',e=>boom(e.clientX,e.clientY));
(function f(){ctx.fillStyle='rgba(0,0,20,.2)';ctx.fillRect(0,0,cv.width,cv.height);for(let i=ps.length-1;i>=0;i--){let p=ps[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.03;p.vx*=.99;p.vy*=.99;p.a-=.01;ctx.globalAlpha=p.a;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s||2,0,Math.PI*2);ctx.fill();if(p.a<=0)ps.splice(i,1)}ctx.globalAlpha=1;if(Math.random()<.02){let x=Math.random()*cv.width,y=Math.random()*180;ctx.strokeStyle='white';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-50,y-15);ctx.stroke()}requestAnimationFrame(f)})();
const msgs=[
"❤️ I Love You ❤️",
"💖 My Beautiful Wife 💖",
"🥰 I Miss You 🥰",
"♾️ Forever ♾️",
"💘 You Mean Everything To Me 💘",
"💕 You're My Favorite Person 💕",
"🌎 My Whole World 🌎",
"😘 Can't Wait To Hold You Again 😘",
"💝 Happy 4th Beautiful 💝",
"❤️ Always & Forever ❤️"
];
const main=document.getElementById('main');
setInterval(()=>{

    let d = document.createElement("div");

    d.className = "float";

    d.textContent = msgs[Math.floor(Math.random()*msgs.length)];

    // Random position around the center
    const isPhone = window.innerWidth < 600;

const radius = isPhone
    ? 130 + Math.random() * 50
    : 220 + Math.random() * 120;

const angle = Math.random() * Math.PI * 2;

d.style.left = `calc(50% + ${Math.cos(angle) * radius}px)`;
d.style.top = `calc(50% + ${Math.sin(angle) * radius}px)`;

    document.body.appendChild(d);

    setTimeout(() => d.remove(), 5000);

},5000);
const pets=["🐱","🐶","🐈","🐕","🐈‍⬛","🐕‍🦺"];setInterval(()=>{let e=document.createElement('div');e.className='pet';e.style.pointerEvents = "auto";e.style.cursor = "pointer";e.textContent=pets[Math.floor(Math.random()*pets.length)];e.style.bottom=(10+Math.random()*120)+'px';e.style.animationDuration=(6+Math.random()*4)+'s';e.onclick = function(event){

    event.stopPropagation();

    for(let i=0;i<6;i++){

        const heart=document.createElement("div");

        heart.className="heart";

        heart.textContent=Math.random()>.5 ? "❤️":"💖";

        heart.style.left=(event.clientX+(Math.random()-0.5)*60)+"px";

        heart.style.top=(event.clientY+(Math.random()-0.5)*60)+"px";

        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),2000);

    }

    firework(event.clientX,event.clientY);

};

document.body.appendChild(e);setTimeout(()=>e.remove(),10000)},1800);
setInterval(()=>{

    for(let i=0;i<25;i++){

        setTimeout(()=>{

            firework(

                Math.random()*innerWidth,

                Math.random()*innerHeight*.5+40

            );

        },i*120);

    }

},60000);
</script></body></html>
