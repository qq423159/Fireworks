<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>For My Beautiful Wife ❤️</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(#02040f,#000);}
canvas{position:fixed;inset:0}
#msg{position:fixed;top:15%;width:100%;text-align:center;color:#fff;font:700 3rem Arial;text-shadow:0 0 20px #fff;transition:opacity 1s}
.pet{position:fixed;font-size:42px;bottom:10px;animation:run linear forwards}
@keyframes run{from{transform:translateX(-60px)}to{transform:translateX(calc(100vw + 60px))}}
</style></head><body>
<canvas id=c></canvas><div id=msg>I Love You ❤️</div>
<script>
const cv=c,ctx=cv.getContext('2d');function rs(){cv.width=innerWidth;cv.height=innerHeight}onresize=rs;rs();
const parts=[];function boom(x,y){let col=`hsl(${Math.random()*360},100%,60%)`;for(let i=0;i<120;i++)parts.push({x,y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,a:1,c:col});}
setInterval(()=>boom(Math.random()*cv.width,50+Math.random()*cv.height*.5),650);
addEventListener("pointerdown",e=>boom(e.clientX,e.clientY));
function anim(){
ctx.fillStyle="rgba(0,0,20,.2)";ctx.fillRect(0,0,cv.width,cv.height);
// stars
for(let i=0;i<40;i++){ctx.fillStyle="white";ctx.globalAlpha=Math.random();ctx.fillRect((i*97)%cv.width,(i*53)%cv.height,2,2)}
// shooting star
if(Math.random()<0.01){parts.push({star:1,x:-50,y:Math.random()*200,vx:10,vy:3,a:1})}
ctx.globalAlpha=1;
for(let i=parts.length-1;i>=0;i--){
let p=parts[i];
if(p.star){p.x+=p.vx;p.y+=p.vy;ctx.strokeStyle="#fff";ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-40,p.y-12);ctx.stroke();if(p.x>cv.width+50)parts.splice(i,1);continue;}
p.x+=p.vx;p.y+=p.vy;p.vy+=.03;p.vx*=.99;p.vy*=.99;p.a-=.01;
ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,2,0,7);ctx.fill();
if(p.a<=0)parts.splice(i,1);
}
ctx.globalAlpha=1;requestAnimationFrame(anim)}
anim();
const msgs=["I Love You ❤️","My Beautiful Wife ❤️","Forever ❤️","I Miss You ❤️"];
let mi=0;setInterval(()=>{msg.style.opacity=0;setTimeout(()=>{mi=(mi+1)%msgs.length;msg.textContent=msgs[mi];msg.style.opacity=1;},900)},5000);
const pets=["🐱","🐶","🐈","🐕","🐈‍⬛","🐕‍🦺"];
setInterval(()=>{
 let d=document.createElement("div");d.className="pet";d.textContent=pets[Math.floor(Math.random()*pets.length)];
 d.style.bottom=(10+Math.random()*120)+"px";d.style.animationDuration=(6+Math.random()*5)+"s";
 document.body.appendChild(d);setTimeout(()=>d.remove(),12000);
},1800);
</script>
</body></html>
